name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet (root module)
        run: go vet ./...

      - name: Test (root module)
        run: go test ./...

      - name: Build
        run: go build ./cmd/trailtool/

      # ingestor/ is a separate Go module, so the root `./...` above never
      # descends into it. Run its vet/test explicitly or its packages (parser,
      # aggregator, session, dynamodb) go unchecked in CI.
      - name: Vet (ingestor module)
        working-directory: ingestor
        run: go vet ./...

      - name: Test (ingestor module)
        working-directory: ingestor
        run: go test ./...

      - name: Build (ingestor)
        working-directory: ingestor
        run: go build ./...
