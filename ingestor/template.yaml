AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: TrailTool Ingestor - Processes CloudTrail logs from S3 and writes to DynamoDB (single-tenant)

Parameters:
  CloudTrailBucketName:
    Type: String
    Description: Name of the S3 bucket containing CloudTrail logs

Globals:
  Function:
    Timeout: 300
    MemorySize: 512
    Runtime: provided.al2023
    Architectures:
      - x86_64

Resources:
  # DynamoDB Tables
  #
  # 1.0 cutover: these clean-named tables replace the pre-1.0 *-aggregated
  # tables. The rename is what lets CloudFormation apply the new key schemas —
  # deploying over a pre-1.0 stack DELETES the old tables and their data
  # (deliberate; history rebuilds from CloudTrail going forward).

  RolesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: trailtool-roles
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: customerId
          AttributeType: S
        - AttributeName: arn
          AttributeType: S
      KeySchema:
        - AttributeName: customerId
          KeyType: HASH
        - AttributeName: arn
          KeyType: RANGE

  ServicesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: trailtool-services
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: customerId
          AttributeType: S
        - AttributeName: event_source
          AttributeType: S
      KeySchema:
        - AttributeName: customerId
          KeyType: HASH
        - AttributeName: event_source
          KeyType: RANGE

  ResourcesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: trailtool-resources
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: customerId
          AttributeType: S
        - AttributeName: identifier
          AttributeType: S
      KeySchema:
        - AttributeName: customerId
          KeyType: HASH
        - AttributeName: identifier
          KeyType: RANGE

  PeopleTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: trailtool-people
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: customerId
          AttributeType: S
        - AttributeName: person_key
          AttributeType: S
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: customerId
          KeyType: HASH
        - AttributeName: person_key
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: email_index
          KeySchema:
            - AttributeName: customerId
              KeyType: HASH
            - AttributeName: email
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  SessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: trailtool-sessions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk # customerId#person_key
          AttributeType: S
        - AttributeName: sk # anchor#roleID | win#roleID#start
          AttributeType: S
        - AttributeName: role_key # customerId#role_id
          AttributeType: S
        - AttributeName: account_key # customerId#account_id
          AttributeType: S
        - AttributeName: start_time
          AttributeType: S
        - AttributeName: customerId
          AttributeType: S
        - AttributeName: sid # short deterministic session id (identity.Sid)
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: sid_index
          KeySchema:
            - AttributeName: customerId
              KeyType: HASH
            - AttributeName: sid
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: role_index
          KeySchema:
            - AttributeName: role_key
              KeyType: HASH
            - AttributeName: start_time
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: account_index
          KeySchema:
            - AttributeName: account_key
              KeyType: HASH
            - AttributeName: start_time
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  AccountsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: trailtool-accounts
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: customerId
          AttributeType: S
        - AttributeName: account_id
          AttributeType: S
      KeySchema:
        - AttributeName: customerId
          KeyType: HASH
        - AttributeName: account_id
          KeyType: RANGE

  IdentityLinksTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: trailtool-identity-links
      BillingMode: PAY_PER_REQUEST
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      AttributeDefinitions:
        - AttributeName: pk # cred#… | chain#… | login#… | mcp#…
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH

  IngestedFilesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: trailtool-ingested-files
      BillingMode: PAY_PER_REQUEST
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      AttributeDefinitions:
        - AttributeName: object_key
          AttributeType: S
      KeySchema:
        - AttributeName: object_key
          KeyType: HASH

  # IAM Role for Lambda
  TrailToolIngestorRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: trailtool-ingestor-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBWritePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem # win# session folding (multi-window fold: atomic put+delete via TransactWriteItems, authorized by the item-level actions)
                  - dynamodb:Query
                  - dynamodb:BatchGetItem
                Resource:
                  - !GetAtt RolesTable.Arn
                  - !GetAtt ServicesTable.Arn
                  - !GetAtt ResourcesTable.Arn
                  - !GetAtt PeopleTable.Arn
                  - !Sub "${PeopleTable.Arn}/index/*"
                  - !GetAtt SessionsTable.Arn
                  - !Sub "${SessionsTable.Arn}/index/*"
                  - !GetAtt AccountsTable.Arn
                  - !GetAtt IdentityLinksTable.Arn
                  - !GetAtt IngestedFilesTable.Arn
        - PolicyName: S3ReadPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub "arn:aws:s3:::${CloudTrailBucketName}/*"

  # Lambda Function
  TrailToolIngestorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: trailtool-ingestor
      CodeUri: bin/bootstrap.zip
      Handler: bootstrap
      Role: !GetAtt TrailToolIngestorRole.Arn
      Environment:
        Variables:
          ROLES_TABLE: !Ref RolesTable
          SERVICES_TABLE: !Ref ServicesTable
          RESOURCES_TABLE: !Ref ResourcesTable
          PEOPLE_TABLE: !Ref PeopleTable
          SESSIONS_TABLE: !Ref SessionsTable
          ACCOUNTS_TABLE: !Ref AccountsTable
          IDENTITY_LINKS_TABLE: !Ref IdentityLinksTable
          INGESTED_FILES_TABLE: !Ref IngestedFilesTable
          IDLE_GAP: 30m # windowed-fallback sessions only (long-lived keys, root)
      Description: Processes CloudTrail logs from S3 and writes aggregated data to DynamoDB

  # Custom Resource - Enable EventBridge notifications on S3 bucket
  BucketEventBridgeHelperRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3NotificationAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutBucketNotification
                  - s3:GetBucketNotification
                Resource: !Sub 'arn:aws:s3:::${CloudTrailBucketName}'

  BucketEventBridgeHelperFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: trailtool-bucket-eventbridge
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt BucketEventBridgeHelperRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import json
          import boto3
          from urllib.request import Request, urlopen

          s3 = boto3.client('s3')

          SUCCESS = "SUCCESS"
          FAILED = "FAILED"

          def send(event, context, status, data, reason=None):
              body = json.dumps({
                  'Status': status,
                  'Reason': reason or f"See CloudWatch Log Stream: {context.log_stream_name}",
                  'PhysicalResourceId': context.log_stream_name,
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'Data': data
              })
              try:
                  req = Request(event['ResponseURL'], data=body.encode('utf-8'),
                                headers={'content-type': '', 'content-length': str(len(body))}, method='PUT')
                  urlopen(req)
              except Exception as e:
                  print(f"send failed: {e}")

          def handler(event, context):
              try:
                  print(f"Event: {json.dumps(event)}")
                  bucket = event['ResourceProperties']['BucketName']

                  if event['RequestType'] == 'Delete':
                      send(event, context, SUCCESS, {})
                      return

                  config = s3.get_bucket_notification_configuration(Bucket=bucket)
                  config.pop('ResponseMetadata', None)

                  if 'EventBridgeConfiguration' not in config:
                      config['EventBridgeConfiguration'] = {}
                      s3.put_bucket_notification_configuration(
                          Bucket=bucket, NotificationConfiguration=config)
                      print(f"Enabled EventBridge on bucket {bucket}")
                  else:
                      print(f"EventBridge already enabled on bucket {bucket}")

                  send(event, context, SUCCESS, {})
              except Exception as e:
                  print(f"Error: {e}")
                  send(event, context, FAILED, {}, reason=str(e))

  EnableBucketEventBridge:
    Type: Custom::EnableEventBridge
    Properties:
      ServiceToken: !GetAtt BucketEventBridgeHelperFunction.Arn
      BucketName: !Ref CloudTrailBucketName

  # EventBridge Rule to trigger on S3 object creation
  CloudTrailEventRule:
    Type: AWS::Events::Rule
    DependsOn: EnableBucketEventBridge
    Properties:
      Name: trailtool-cloudtrail-trigger
      Description: Triggers ingestor when new CloudTrail logs are written to S3
      EventPattern:
        source:
          - aws.s3
        detail-type:
          - Object Created
        detail:
          bucket:
            name:
              - !Ref CloudTrailBucketName
          object:
            key:
              - prefix: AWSLogs/
              - suffix: .json.gz
      Targets:
        - Arn: !GetAtt TrailToolIngestorFunction.Arn
          Id: TrailToolIngestor

  EventBridgeInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref TrailToolIngestorFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt CloudTrailEventRule.Arn

  # CloudWatch Log Group
  IngestorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${TrailToolIngestorFunction}"
      RetentionInDays: 7

Outputs:
  FunctionName:
    Description: Name of the CloudTrail ingestor Lambda function
    Value: !Ref TrailToolIngestorFunction

  FunctionArn:
    Description: ARN of the CloudTrail ingestor Lambda function
    Value: !GetAtt TrailToolIngestorFunction.Arn

  SessionsTableName:
    Description: Name of the sessions DynamoDB table
    Value: !Ref SessionsTable

  RolesTableName:
    Description: Name of the roles DynamoDB table
    Value: !Ref RolesTable
