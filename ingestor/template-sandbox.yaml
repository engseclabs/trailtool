AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: TrailTool Sandbox - Creates CloudTrail, S3 bucket, ingestor Lambda, and DynamoDB tables (all-in-one)

Parameters:
  TrailName:
    Type: String
    Description: Name for the CloudTrail trail
    Default: trailtool-trail

Globals:
  Function:
    Timeout: 300
    MemorySize: 512
    Runtime: provided.al2023
    Architectures:
      - x86_64

Resources:
  # S3 Bucket for CloudTrail logs
  CloudTrailBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'trailtool-cloudtrail-${AWS::AccountId}-${AWS::Region}'
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldLogs
            Status: Enabled
            ExpirationInDays: 90
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # Bucket policy for CloudTrail write access
  CloudTrailBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref CloudTrailBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AWSCloudTrailAclCheck
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !GetAtt CloudTrailBucket.Arn

          - Sid: AWSCloudTrailWrite
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub '${CloudTrailBucket.Arn}/AWSLogs/${AWS::AccountId}/*'
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control

  # CloudTrail trail
  CloudTrail:
    Type: AWS::CloudTrail::Trail
    DependsOn: CloudTrailBucketPolicy
    Properties:
      TrailName: !Ref TrailName
      S3BucketName: !Ref CloudTrailBucket
      IsLogging: true
      IsMultiRegionTrail: true
      IncludeGlobalServiceEvents: true
      EnableLogFileValidation: true

  # DynamoDB Tables
  #
  # 1.0 cutover: these clean-named tables replace the pre-1.0 *-aggregated
  # tables. The rename is what lets CloudFormation apply the new key schemas —
  # deploying over a pre-1.0 stack DELETES the old tables and their data
  # (deliberate; history rebuilds from CloudTrail going forward).
  RolesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: trailtool-roles
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: customerId
          AttributeType: S
        - AttributeName: arn
          AttributeType: S
      KeySchema:
        - AttributeName: customerId
          KeyType: HASH
        - AttributeName: arn
          KeyType: RANGE

  ServicesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: trailtool-services
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: customerId
          AttributeType: S
        - AttributeName: event_source
          AttributeType: S
      KeySchema:
        - AttributeName: customerId
          KeyType: HASH
        - AttributeName: event_source
          KeyType: RANGE

  ResourcesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: trailtool-resources
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: customerId
          AttributeType: S
        - AttributeName: identifier
          AttributeType: S
      KeySchema:
        - AttributeName: customerId
          KeyType: HASH
        - AttributeName: identifier
          KeyType: RANGE

  PeopleTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: trailtool-people
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: customerId
          AttributeType: S
        - AttributeName: person_key
          AttributeType: S
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: customerId
          KeyType: HASH
        - AttributeName: person_key
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: email_index
          KeySchema:
            - AttributeName: customerId
              KeyType: HASH
            - AttributeName: email
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  SessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: trailtool-sessions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk # customerId#person_key
          AttributeType: S
        - AttributeName: sk # anchor#roleID | win#roleID#start
          AttributeType: S
        - AttributeName: role_key # customerId#role_id
          AttributeType: S
        - AttributeName: account_key # customerId#account_id
          AttributeType: S
        - AttributeName: start_time
          AttributeType: S
        - AttributeName: customerId
          AttributeType: S
        - AttributeName: sid # short deterministic session id (identity.Sid)
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: sid_index
          KeySchema:
            - AttributeName: customerId
              KeyType: HASH
            - AttributeName: sid
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: role_index
          KeySchema:
            - AttributeName: role_key
              KeyType: HASH
            - AttributeName: start_time
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: account_index
          KeySchema:
            - AttributeName: account_key
              KeyType: HASH
            - AttributeName: start_time
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  AccountsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: trailtool-accounts
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: customerId
          AttributeType: S
        - AttributeName: account_id
          AttributeType: S
      KeySchema:
        - AttributeName: customerId
          KeyType: HASH
        - AttributeName: account_id
          KeyType: RANGE

  IdentityLinksTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: trailtool-identity-links
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk # cred#… | chain#… | login#… | mcp#…
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  IngestedFilesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: trailtool-ingested-files
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: object_key
          AttributeType: S
      KeySchema:
        - AttributeName: object_key
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # IAM Role for Lambda
  TrailToolIngestorRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: trailtool-ingestor-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBWritePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem # win# session folding
                  - dynamodb:TransactWriteItems # win# multi-window fold (atomic put+delete)
                  - dynamodb:Query
                  - dynamodb:BatchGetItem
                Resource:
                  - !GetAtt RolesTable.Arn
                  - !GetAtt ServicesTable.Arn
                  - !GetAtt ResourcesTable.Arn
                  - !GetAtt PeopleTable.Arn
                  - !Sub "${PeopleTable.Arn}/index/*"
                  - !GetAtt SessionsTable.Arn
                  - !Sub "${SessionsTable.Arn}/index/*"
                  - !GetAtt AccountsTable.Arn
                  - !GetAtt IdentityLinksTable.Arn
                  - !GetAtt IngestedFilesTable.Arn
        - PolicyName: S3ReadPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub "${CloudTrailBucket.Arn}/*"

  # Lambda Function
  TrailToolIngestorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: trailtool-ingestor
      CodeUri: bin/bootstrap.zip
      Handler: bootstrap
      Role: !GetAtt TrailToolIngestorRole.Arn
      Environment:
        Variables:
          ROLES_TABLE: !Ref RolesTable
          SERVICES_TABLE: !Ref ServicesTable
          RESOURCES_TABLE: !Ref ResourcesTable
          PEOPLE_TABLE: !Ref PeopleTable
          SESSIONS_TABLE: !Ref SessionsTable
          ACCOUNTS_TABLE: !Ref AccountsTable
          IDENTITY_LINKS_TABLE: !Ref IdentityLinksTable
          INGESTED_FILES_TABLE: !Ref IngestedFilesTable
          IDLE_GAP: 30m # windowed-fallback sessions only (long-lived keys, root)
      Description: Processes CloudTrail logs from S3 and writes aggregated data to DynamoDB

  # EventBridge Rule to trigger on S3 object creation
  CloudTrailEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: trailtool-cloudtrail-trigger
      Description: Triggers ingestor when new CloudTrail logs are written to S3
      EventPattern:
        source:
          - aws.s3
        detail-type:
          - Object Created
        detail:
          bucket:
            name:
              - !Ref CloudTrailBucket
          object:
            key:
              - prefix: AWSLogs/
              - suffix: .json.gz
      Targets:
        - Arn: !GetAtt TrailToolIngestorFunction.Arn
          Id: TrailToolIngestor

  EventBridgeInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref TrailToolIngestorFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt CloudTrailEventRule.Arn

  # CloudWatch Log Group
  IngestorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${TrailToolIngestorFunction}"
      RetentionInDays: 7

Outputs:
  CloudTrailBucketName:
    Description: S3 bucket for CloudTrail logs
    Value: !Ref CloudTrailBucket

  TrailArn:
    Description: CloudTrail trail ARN
    Value: !GetAtt CloudTrail.Arn

  FunctionName:
    Description: Name of the CloudTrail ingestor Lambda function
    Value: !Ref TrailToolIngestorFunction

  FunctionArn:
    Description: ARN of the CloudTrail ingestor Lambda function
    Value: !GetAtt TrailToolIngestorFunction.Arn

  SessionsTableName:
    Description: Name of the sessions DynamoDB table
    Value: !Ref SessionsTable

  RolesTableName:
    Description: Name of the roles DynamoDB table
    Value: !Ref RolesTable
